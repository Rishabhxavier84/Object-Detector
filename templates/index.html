<!doctype html>
<html>
  <head>
    <title>Object Detection</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container m-5 border p-5 rounded">
        
        <div class="container d-flex">
            <div class="container p-5">
            <h1 class="mb-5">Upload Image</h1>
            <form method="POST" enctype="multipart/form-data">
          <!-- <input type="file" name="image" required /> -->
          <div class="mb-3">
            <!-- <label for="formFile" class="form-label">Upload Image</label> -->
            <input
              class="form-control"
              type="file"
              id="image"
              name="image"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary mb-3">Upload</button>
        </form>
        </div>

        {% if result_image %}
        <div class="container p-5 ">
          <!-- <label for="formFile" class="form-label m-5 mt-0"><strong>Result</strong></label> -->
           <h1 class="mb-5">Result</h1>
          <img
            src="{{ url_for('result_image', filename = result_image) }}"
            class="img-fluid mx-auto d-block"
            width="""
          />
        </div>
        {% endif %}
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
